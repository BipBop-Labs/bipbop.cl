<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" role="img" aria-label="BipBop Labs">
  <title>BipBop Labs · software hecho con cariño</title>
  <defs>
    <radialGradient id="glow-tr" cx="55%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#0e8a44" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0e8a44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bl" cx="8%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#0e8a44" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0e8a44" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f3eee5"/>
  <rect width="1200" height="630" fill="url(#glow-tr)"/>
  <rect width="1200" height="630" fill="url(#glow-bl)"/>

  <image x="780" y="180" width="180" height="320" preserveAspectRatio="xMidYMid meet" xlink:href="bipbop_logo.webp"/>

  <text x="760" y="320" text-anchor="end"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-size="120" fill="#161513"
    >Bip<tspan font-style="italic" fill="#0e8a44">Bop</tspan> Labs<tspan fill="#0e8a44">_</tspan></text>

  <text x="760" y="380" text-anchor="end"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-style="italic" font-size="34" fill="#4a4640"
    >Software hecho con cari&#241;o,</text>
  <text x="760" y="424" text-anchor="end"
        font-family="'Instrument Serif', 'Times New Roman', serif"
        font-style="italic" font-size="34" fill="#4a4640"
    >pensado contigo y construido a tu lado.</text>

  <line x1="88" y1="558" x2="1112" y2="558" stroke="#d4ccba" stroke-width="1"/>
  <text x="88" y="592" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-size="20" letter-spacing="5" fill="#8a8378">SANTIAGO &#183; CL</text>
  <text x="1112" y="592" text-anchor="end" font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-size="20" letter-spacing="5" fill="#161513">BIPBOP.CL</text>
</svg>
